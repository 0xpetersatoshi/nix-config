---
name: pr-reviewer
description: Check out and review a GitHub pull request by number using the gh CLI. Use when the user asks to pull down, check out, or review a PR by number.
argument-hint: [pr-number]
allowed-tools: Bash(gh *), Bash(git *), Read, Grep, Glob
disable-model-invocation: true
---

Pull down and review GitHub pull request #$ARGUMENTS.

1. Verify the gh CLI is authenticated: `gh auth status`
2. View the PR metadata and description: `gh pr view $ARGUMENTS`
3. Check out the PR branch locally: `gh pr checkout $ARGUMENTS`
4. Show the diff: `gh pr diff $ARGUMENTS`
5. Summarize what the PR changes, why, and anything a reviewer should look at closely.

Review checklist:
- Code is clear and readable
- Functions and variables are well-named
- No duplicated code
- Proper error handling
- No exposed secrets or API keys
- Input validation implemented
- Good test coverage
- Performance considerations addressed

Provide feedback organized by priority:
- Critical issues (must fix)
- Warnings (should fix)
- Suggestions (consider improving)

Include specific examples of how to fix issues. Each finding should also include a severity level
(i.e. "high", "medium", "low").

Finally, at the end, include a brief summary of the review findings and include a verdict on whether the code
if fine to ship as-is or if it needs further work. If there are any
critical issues the verdict should be that the code is blocked until these issues are fixed.

